<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Register - Smart Agri</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

  <div class="bg-white p-8 rounded shadow w-full max-w-sm">
    <h1 class="text-2xl font-bold mb-4 text-center">Smart Agriculture</h1>
    <h2 class="text-lg mb-4 text-center text-gray-600">Register</h2>

    {% if error %}
      <div class="bg-red-100 text-red-700 p-2 rounded mb-3 text-sm">{{ error }}</div>
    {% endif %}

    <form method="POST">
      {% csrf_token %}

      <label class="block text-sm mb-1">Username</label>
      <input type="text" name="username" required
             class="w-full border p-2 rounded mb-3" />

      <label class="block text-sm mb-1">Password</label>
      <input type="password" name="password" required
             class="w-full border p-2 rounded mb-3" />

      <label class="block text-sm mb-1">Role</label>
      <select name="role" class="w-full border p-2 rounded mb-4">
        <option value="farmer">Farmer</option>
        <option value="fpo_admin">FPO Admin</option>
        <option value="expert">Agronomist / Expert</option>
      </select>

      <button class="bg-green-600 text-white w-full py-2 rounded">Register</button>
    </form>

    <p class="text-sm text-center mt-4">
      Already have account? <a class="text-blue-600 underline" href="{% url 'login' %}">Login</a>
    </p>
  </div>

</body>
</html>
