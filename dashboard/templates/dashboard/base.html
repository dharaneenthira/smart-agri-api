<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Smart Agri Dashboard</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>

<body class="bg-gray-100">
  <nav class="bg-gray-900 text-white p-4">
    <div class="max-w-6xl mx-auto flex justify-between items-center">
      <a href="{% url 'dash_home' %}" class="font-semibold text-lg">Smart Agriculture</a>

      <div class="flex items-center space-x-4 text-sm">
        {% if user.is_authenticated %}
          <a href="{% url 'dash_home' %}" class="hover:underline">Dashboard</a>
          <a href="{% url 'alerts_list' %}" class="hover:underline">Alerts</a>
          <span class="opacity-75">{{ user.username }}</span>
          <a href="{% url 'logout' %}" class="bg-red-600 px-3 py-1 rounded hover:bg-red-700">Logout</a>
        {% else %}
          <a href="{% url 'login' %}" class="hover:underline">Login</a>
        {% endif %}
      </div>
    </div>
  </nav>

  <main class="max-w-6xl mx-auto p-4">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
